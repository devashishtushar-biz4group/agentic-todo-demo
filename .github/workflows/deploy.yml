name: deploy

on:
  push:
    branches: [main]

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: node scripts/render-deploy.mjs "${{ secrets.RENDER_API_STAGING_SERVICE_ID }}"
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}

  smoke-test:
    needs: deploy-staging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: node scripts/smoke-test.mjs "${{ secrets.RENDER_API_STAGING_URL }}"

  deploy-production:
    needs: smoke-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: node scripts/render-deploy.mjs "${{ secrets.RENDER_API_PRODUCTION_SERVICE_ID }}"
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}

  health-check-and-rollback:
    needs: deploy-production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Health check production
        id: healthcheck
        run: node scripts/healthcheck.mjs "${{ secrets.RENDER_API_PRODUCTION_URL }}"
        continue-on-error: true
      - name: Roll back on failed health check
        if: steps.healthcheck.outcome == 'failure'
        run: |
          echo "::error::Production health check failed after deploy -- rolling back"
          node scripts/render-deploy.mjs "${{ secrets.RENDER_API_PRODUCTION_SERVICE_ID }}" --rollback
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      - name: Fail the job if a rollback happened
        if: steps.healthcheck.outcome == 'failure'
        run: exit 1

# Note: this workflow only covers the todo-api-{staging,production} services.
# The static todo-web-{staging,production} sites have no runtime health check
# to fail -- Render deploys them automatically on push via the connected
# Blueprint, and there's nothing meaningful to "roll back" for a static
# bundle in this demo. The rollback drill (Phase 4) targets the API service,
# which is the one with an actual runtime and failure mode.
